<title>18xx Helper</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
  :root {
    --bg: #F1F3EF;
    --surface: #FBFCFA;
    --surface2: #E7EBE5;
    --ink: #20291F;
    --ink-soft: #5C6A5C;
    --line: #D3DAD1;
    --accent: #2F6B52;
    --accent-ink: #FFFFFF;
    --gold: #9A7524;
    --red: #B3402F;
    --shadow: 0 1px 3px rgba(32, 41, 31, .08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #151A17;
      --surface: #1E2420;
      --surface2: #29312B;
      --ink: #E4EAE2;
      --ink-soft: #93A093;
      --line: #384139;
      --accent: #5FA383;
      --accent-ink: #10241B;
      --gold: #D2A64C;
      --red: #E0705F;
      --shadow: 0 1px 3px rgba(0, 0, 0, .35);
    }
  }
  :root[data-theme="light"] {
    --bg: #F1F3EF; --surface: #FBFCFA; --surface2: #E7EBE5;
    --ink: #20291F; --ink-soft: #5C6A5C; --line: #D3DAD1;
    --accent: #2F6B52; --accent-ink: #FFFFFF;
    --gold: #9A7524; --red: #B3402F;
    --shadow: 0 1px 3px rgba(32, 41, 31, .08);
  }
  :root[data-theme="dark"] {
    --bg: #151A17; --surface: #1E2420; --surface2: #29312B;
    --ink: #E4EAE2; --ink-soft: #93A093; --line: #384139;
    --accent: #5FA383; --accent-ink: #10241B;
    --gold: #D2A64C; --red: #E0705F;
    --shadow: 0 1px 3px rgba(0, 0, 0, .35);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    font-size: 15px;
    line-height: 1.5;
    padding-bottom: 76px; /* 하단 탭 공간 */
  }
  main { max-width: 560px; margin: 0 auto; padding: 0 14px; }

  header {
    max-width: 560px; margin: 0 auto; padding: 18px 14px 10px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; flex-wrap: wrap; row-gap: 6px;
  }
  header h1 {
    margin: 0; white-space: nowrap;
    font-family: "Nanum Myeongjo", Batang, "Apple Myungjo", Georgia, serif;
    font-size: 21px; font-weight: 700; letter-spacing: .02em;
  }
  header h1 small { color: var(--accent); font-size: 13px; margin-left: 6px; letter-spacing: .12em; }
  /* 화면이 좁으면 버튼 묶음이 통째로 다음 줄로 내려가되 오른쪽 정렬 유지 */
  header .row { margin-left: auto; flex-wrap: wrap; justify-content: flex-end; row-gap: 6px; }
  .hbtn {
    background: none; border: 1px solid var(--line); color: var(--ink-soft);
    border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer;
  }
  #sessionBadge {
    background: var(--surface2); color: var(--accent); border-radius: 999px;
    padding: 3px 10px; font-size: 12px; font-weight: 700; letter-spacing: .08em;
    font-variant-numeric: tabular-nums;
  }
  .session-code {
    text-align: center; font-size: 30px; font-weight: 800; letter-spacing: .28em;
    color: var(--accent); margin: 4px 0 12px; font-variant-numeric: tabular-nums;
  }
  footer { max-width: 560px; margin: 6px auto 0; padding: 0 14px 10px; text-align: center; }
  #supportLinks { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
  footer a {
    display: inline-block; color: var(--ink-soft); font-size: 13px; text-decoration: none;
    border: 1px solid var(--line); border-radius: 999px; padding: 6px 14px;
  }

  .card {
    background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
    box-shadow: var(--shadow); padding: 14px; margin-bottom: 12px;
  }
  .card h2 {
    margin: 0 0 10px; font-size: 12px; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; color: var(--ink-soft);
  }
  .muted { color: var(--ink-soft); font-size: 13px; }
  .money { font-variant-numeric: tabular-nums; font-weight: 700; }
  .neg { color: var(--red); }
  .pos { color: var(--gold); }

  /* 버튼·칩·탭 안에서 글자가 세로로 꺾이지 않도록 */
  button, .chip { white-space: nowrap; }
  button { font-family: inherit; touch-action: manipulation; }
  .btn {
    background: var(--surface2); color: var(--ink); border: 1px solid var(--line);
    border-radius: 8px; padding: 9px 14px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .btn:active { transform: translateY(1px); }
  main button:disabled, main input:disabled { opacity: .45; cursor: default; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
  .btn.small { padding: 5px 10px; font-size: 13px; }
  .btn:focus-visible, input:focus-visible, .chip:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 1px;
  }

  input[type="text"], input[type="number"] {
    background: var(--bg); color: var(--ink); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 10px; font-size: 15px; width: 100%;
    font-variant-numeric: tabular-nums;
  }
  input[type="number"] { -moz-appearance: textfield; }

  .row { display: flex; gap: 8px; align-items: center; }
  .row.wrap { flex-wrap: wrap; }
  .row > * { min-width: 0; } /* 좁은 화면에서 입력칸이 줄어들 수 있게 */
  .grow { flex: 1; }

  /* 좁은 화면(또는 큰 글꼴 배율) 자동 보정 */
  @media (max-width: 420px) {
    body { font-size: 14px; }
    header h1 { font-size: 18px; }
    header h1 small { font-size: 11px; }
    .btn { padding: 8px 10px; font-size: 13px; }
    .chip { padding: 6px 11px; font-size: 13px; }
    nav button { font-size: 13px; }
  }

  /* 칩(회사 선택 등) */
  .chip {
    background: var(--surface2); border: 1px solid var(--line); color: var(--ink);
    border-radius: 999px; padding: 7px 14px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .chip.on { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }

  /* 보유 주식 스테퍼 */
  .stepper { display: flex; align-items: center; gap: 2px; }
  .stepper button {
    width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--surface2); color: var(--ink); font-size: 17px; font-weight: 700; cursor: pointer;
  }
  .stepper .val {
    min-width: 34px; text-align: center; font-variant-numeric: tabular-nums;
    font-weight: 700; font-size: 16px;
  }

  table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  th, td { padding: 7px 4px; text-align: left; border-bottom: 1px solid var(--line); }
  td:last-child, th:last-child { text-align: right; }
  tr:last-child td { border-bottom: none; }

  /* 배당 결과 강조 */
  .payout-summary {
    display: flex; justify-content: space-between; align-items: baseline;
    background: var(--surface2); border-radius: 8px; padding: 10px 12px; margin-bottom: 10px;
  }
  .payout-summary .per { font-size: 22px; }

  .move-hint {
    border-left: 3px solid var(--accent); padding: 6px 10px; margin-top: 10px;
    font-size: 13px; color: var(--ink-soft); background: var(--surface2); border-radius: 0 6px 6px 0;
  }

  /* 하단 탭 */
  nav {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--surface); border-top: 1px solid var(--line);
    display: flex; justify-content: center; gap: 4px; padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
  }
  nav button {
    flex: 1; max-width: 180px; border: none; background: none; color: var(--ink-soft);
    font-size: 14px; font-weight: 700; padding: 10px 4px; border-radius: 8px; cursor: pointer;
  }
  nav button.on { color: var(--accent); background: var(--surface2); }

  .rank-badge {
    display: inline-flex; width: 22px; height: 22px; border-radius: 50%;
    align-items: center; justify-content: center; font-size: 12px; font-weight: 700;
    background: var(--surface2); color: var(--ink-soft); margin-right: 8px;
  }
  .rank-badge.first { background: var(--gold); color: #fff; }

  .empty { text-align: center; color: var(--ink-soft); padding: 28px 10px; font-size: 14px; }

  /* 확인 다이얼로그 (샌드박스에서 confirm()이 차단되므로 자체 구현) */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0, 0, 0, .45);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
    padding: 18px; width: 100%; max-width: 320px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, .3);
  }
  .modal p { margin: 0 0 14px; }
  .btn.danger { background: var(--red); border-color: var(--red); color: #fff; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>

/* Firebase는 빈 배열/null 키를 제거해서 돌려주고, 이전 버전 저장 데이터에는
   자사주/은행주 필드가 없으므로 어디서 온 상태든 여기서 형태를 보정한다 */
function normalizeState(s) {
  s.players = s.players || [];
  s.cash = s.cash || [];
  s.companies = s.companies || [];
  s.selectedCompany = s.selectedCompany || 0;
  s.game = s.game || "";
  while (s.cash.length < s.players.length) s.cash.push(0);
  s.companies.forEach(c => {
    c.hold = c.hold || [];
    while (c.hold.length < s.players.length) c.hold.push(0);
    if (typeof c.treasury !== "number") c.treasury = 0;
    if (typeof c.pool !== "number") c.pool = 0;
  });
  return s;
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = Object.assign(state, JSON.parse(raw));
  } catch (e) { /* 저장소를 못 쓰는 환경이면 메모리로만 동작 */ }
  normalizeState(state);
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  schedulePush();
}

/* ---------- 세션 공유 (Firebase Realtime Database) ---------- */
let session = { code: null, fb: null, unsub: null, owner: null, locked: false };
let pushTimer = null;

function genCode() {
  const chars = "ABCDEFGHJKMNPQRSTUVWXYZ23456789"; // 헷갈리는 0/O/1/I 제외
  let code = "";
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

/* Firebase는 null 값·빈 배열을 저장하지 않고 객체 키 순서도 보장하지 않으므로,
   에코 비교는 정규화(키 정렬 + null/빈 배열 제거)한 JSON으로 한다 */
function canon(o) {
  if (Array.isArray(o)) return o.map(canon);
  if (o && typeof o === "object") {
    const out = {};
    for (const k of Object.keys(o).sort()) {
      const v = canon(o[k]);
      if (v === null || v === undefined) continue;
      if (Array.isArray(v) && v.length === 0) continue;
      out[k] = v;
    }
    return out;
  }
  return o;
}
const stableJson = (o) => JSON.stringify(canon(o));

let fbPromise = null;
function firebase() {
  if (!fbPromise) fbPromise = (async () => {
    const appMod = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js");
    const dbMod = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js");
    const authMod = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js");
    const app = appMod.initializeApp(FIREBASE_CONFIG);
    // 익명 인증: 회원가입 없이 기기별 고유 ID 부여 (방장 판별 + 잠금 규칙에 사용)
    const cred = await authMod.signInAnonymously(authMod.getAuth(app));
    return { db: dbMod.getDatabase(app), uid: cred.user.uid, ref: dbMod.ref, set: dbMod.set, get: dbMod.get, onValue: dbMod.onValue };
  })();
  return fbPromise;
}

const isHost = () => !!(session.fb && session.owner && session.owner === session.fb.uid);
const isReadOnly = () => !!(session.code && session.locked && !isHost());

async function setLocked(v) {
  const fb = session.fb;
  await fb.set(fb.ref(fb.db, "sessions/" + session.code + "/locked"), v);
}

async function createSession() {
  const fb = await firebase();
  const code = genCode();
  await fb.set(fb.ref(fb.db, "sessions/" + code), {
    state, owner: fb.uid, locked: false, updatedAt: Date.now(),
  });
  attachSession(code, fb);
  track("session_created", { game: state.game || "custom" });
  return code;
}

async function joinSession(code) {
  const fb = await firebase();
  const snap = await fb.get(fb.ref(fb.db, "sessions/" + code));
  if (!snap.exists()) throw new Error("not-found");
  attachSession(code, fb);
  track("session_joined");
}

function attachSession(code, fb) {
  if (session.unsub) session.unsub();
  session = { code, fb, owner: null, locked: false };
  try { localStorage.setItem(SESSION_KEY, code); } catch (e) {}
  // state뿐 아니라 owner/locked 변경도 실시간 반영해야 하므로 세션 노드 전체를 구독
  session.unsub = fb.onValue(fb.ref(fb.db, "sessions/" + code), snap => {
    const val = snap.val();
    if (!val) return;
    const lockChanged = session.locked !== !!val.locked;
    session.owner = val.owner || null;
    session.locked = !!val.locked;
    updateSessionBadge();

    const remote = val.state;
    if (remote && stableJson(remote) !== stableJson(state)) {
      state = normalizeState(remote);
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
      render();
    } else if (lockChanged) {
      render(); // 잠금 상태만 바뀌어도 읽기 전용 UI를 갱신
    }
  });
  updateSessionBadge();
}

function leaveSession() {
  if (session.unsub) session.unsub();
  session = { code: null, fb: null, unsub: null, owner: null, locked: false };
  try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
  updateSessionBadge();
  render();
}

function schedulePush() {
  if (!session.code || isReadOnly()) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(() => {
    const fb = session.fb;
    fb.set(fb.ref(fb.db, "sessions/" + session.code + "/state"), state).catch(() => {});
  }, 250);
}

function updateSessionBadge() {
  const badge = document.getElementById("sessionBadge");
  badge.hidden = !session.code;
  badge.textContent = session.code ? "● " + session.code + (session.locked ? " 🔒" : "") : "";
}

const esc = (s) => s.replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

/* ---------- 배당 계산 ---------- */
function calcDividend(company, revenue) {
  const per = Math.floor(revenue / company.size);
  return {
    per,
    payouts: company.hold.map(h => h * per),
    treasuryAmt: company.treasury * per + (revenue - per * company.size), // 끝수는 회사 금고로
    poolAmt: company.pool * per,
  };
}

// 게임별 주가 이동 규칙
// 18Korea: 유보 → 1칸 아래 / 배당 < 주가 → 제자리, ≥ 주가 → 1칸 위, ≥ 주가×2 → 2칸 위
// 그 외(1817 기준): 유보 → 왼쪽 1칸 / 총배당 ≥ 주가×n → 오른쪽 n칸(최대 3)
function priceMoveHint(company, revenue, mode) {
  const noPrice = !company.price || company.price <= 0;

  if (state.game === "18Korea") {
    if (mode === "withhold" || revenue <= 0) return t("koreaDown");
    if (noPrice) return t("needPrice");
    if (revenue < company.price) return t("koreaStay");
    if (revenue < company.price * 2) return t("koreaUp1");
    return t("koreaUp2");
  }

  if (mode === "withhold" || revenue <= 0) return t("left1817");
  if (noPrice) return t("needPrice");
  const mult = Math.floor(revenue / company.price);
  if (mult <= 0) return t("stay1817");
  const n = Math.min(3, mult);
  return t("right1817", n, fmt(revenue));
}

/* ---------- 주가 트랙 (자동 이동) ---------- */
const marketOf = () => (GAME_PRESETS[state.game] && GAME_PRESETS[state.game].market) || null;

function priceIndex(market, price) {
  let best = 0;
  for (let i = 0; i < market.length; i++)
    if (Math.abs(market[i] - price) < Math.abs(market[best] - price)) best = i;
  return best;
}

function stepPrice(market, price, steps) {
  const idx = Math.max(0, Math.min(market.length - 1, priceIndex(market, price) + steps));
  return market[idx];
}

// 배당/유보에 따른 트랙 이동 칸수 (음수 = 하락, priceMoveHint와 같은 규칙)
function moveSteps(company, revenue, mode) {
  if (mode === "withhold" || revenue <= 0) return -1;
  if (!company.price || company.price <= 0) return 0;
  if (state.game === "18Korea") {
    if (revenue < company.price) return 0;
    return revenue < company.price * 2 ? 1 : 2;
  }
  return Math.min(3, Math.floor(revenue / company.price)); // 1817 기준
}

  if (activeTab === "company") renderCompany();
  if (activeTab === "score") renderScore();

  // 잠긴 세션의 비방장: 보기 전용 — 조작 요소 비활성화 + 안내 배너
  if (isReadOnly()) {
    const viewEl = document.getElementById("view-" + activeTab);
    viewEl.insertAdjacentHTML("afterbegin",
      `<div class="card" style="border-left:3px solid var(--gold)"><span class="muted">${t("readOnlyBanner")}</span></div>`);
    viewEl.querySelectorAll("input, button").forEach(x => x.disabled = true);
  }
}

/* --- 배당 탭 --- */
function renderDividend() {
  const el = document.getElementById("view-dividend");
  if (state.companies.length === 0 || state.players.length === 0) {
    el.innerHTML = `<div class="card"><div class="empty">${t("emptyDividend")}</div></div>`;
    return;
  }
  if (state.selectedCompany >= state.companies.length) state.selectedCompany = 0;
  const co = state.companies[state.selectedCompany];

  const chips = state.companies.map((c, i) =>
    `<button class="chip ${i === state.selectedCompany ? "on" : ""}" data-co="${i}">${esc(c.name)}</button>`
  ).join("");

  let resultHtml = "";
  if (state.lastDividend && state.lastDividend.companyIdx === state.selectedCompany) {
    const { revenue, mode } = state.lastDividend;
    const r = calcDividend(co, revenue);
    const rows = state.players.map((p, i) => {
      const shares = co.hold[i];
      if (!shares) return "";
      const amt = mode === "withhold" ? 0 : r.payouts[i];
      const cls = amt < 0 ? "neg" : "pos";
      const shareLabel = t("shares", shares) + (shares < 0 ? t("shortTag") : "");
      return `<tr><td>${esc(p)}</td><td class="muted">${shareLabel}</td>
        <td class="money ${cls}">${amt < 0 ? "−" + fmt(-amt) : fmt(amt)}</td></tr>`;
    }).join("");
    let companyRows;
    if (mode === "withhold") {
      companyRows = `<tr><td>${t("companyTreasury")}</td><td class="muted">${t("allWithheld")}</td>
        <td class="money">${fmt(revenue)}</td></tr>`;
    } else {
      companyRows = "";
      if (co.treasury > 0 || r.treasuryAmt > 0)
        companyRows += `<tr><td>${t("treasuryRow")}</td><td class="muted">${t("shares", co.treasury)}${r.treasuryAmt > co.treasury * r.per ? t("remainderTag") : ""}</td>
          <td class="money">${fmt(r.treasuryAmt)}</td></tr>`;
      if (co.pool > 0)
        companyRows += `<tr><td>${t("poolRow")}</td><td class="muted">${t("shares", co.pool)} · ${t("rule1817")}</td>
          <td class="money">${fmt(r.poolAmt)}</td></tr>`;
    }
    // 주가 트랙이 있는 게임: 한 번 탭으로 주가 이동 확정
    let applyHtml = "";
    const market = marketOf();
    if (market) {
      if (state.lastDividend.applied) {
        applyHtml = `<div class="muted" style="margin-top:8px">✓ ${t("priceApplied", fmt(state.lastDividend.applied.from), fmt(state.lastDividend.applied.to))}</div>`;
      } else {
        const steps = moveSteps(co, revenue, mode);
        const arrow = steps < 0 ? `▼${-steps}` : steps > 0 ? `▲${steps}` : "±0";
        applyHtml = `<button class="btn primary" id="applyPriceBtn" style="width:100%; margin-top:10px">${t("applyPrice")} (${arrow} · ${fmt(co.price)} → ${fmt(stepPrice(market, co.price, steps))})</button>`;
      }
    }
    resultHtml = `
      <div class="card">
        <h2>${esc(co.name)} — ${mode === "withhold" ? t("withholdTitle") : t("payTitle")}</h2>
        <div class="payout-summary">
          <span class="muted">${t("perShare")}</span>
          <span class="money per">${mode === "withhold" ? fmt(0) : fmt(r.per)}</span>
        </div>
        <table>
          ${rows}
          ${companyRows}
        </table>
        <div class="move-hint">${priceMoveHint(co, revenue, mode)}${market ? "" : " · " + t("moveChart")}</div>
        ${applyHtml}
      </div>`;
  }

  el.innerHTML = `
    <div class="card">
      <h2>${t("pickCompany")}</h2>
      <div class="row wrap">${chips}</div>
    </div>
    <div class="card">
      <h2>${t("revenueTitle", co.size, fmt(co.price))}</h2>
      <div class="row wrap">
        <input type="number" id="revenueInput" class="grow" inputmode="numeric"
               style="min-width:120px"
               placeholder="${t("revenuePlaceholder")}" value="${state.lastDividend?.revenue ?? ""}">
        <button class="btn small" data-add="10">+10</button>
        <button class="btn small" data-add="50">+50</button>
        <button class="btn small" data-add="100">+100</button>
      </div>
      <div class="row" style="margin-top:10px">
        <button class="btn primary grow" id="payBtn">${t("pay")}</button>
        <button class="btn grow" id="withholdBtn">${t("withhold")}</button>
      </div>
    </div>
    ${resultHtml}`;

  el.querySelectorAll("[data-co]").forEach(b => b.onclick = () => {
    state.selectedCompany = +b.dataset.co;
    state.lastDividend = null;
    save(); render();
  });
  el.querySelectorAll("[data-add]").forEach(b => b.onclick = () => {
    const input = document.getElementById("revenueInput");
    input.value = (parseInt(input.value, 10) || 0) + +b.dataset.add;
  });
  const run = (mode) => {
    const revenue = parseInt(document.getElementById("revenueInput").value, 10) || 0;
    state.lastDividend = { companyIdx: state.selectedCompany, revenue, mode };
    track("dividend_calculated", { game: state.game || "custom", mode });
    save(); render();
  };
  el.querySelector("#payBtn").onclick = () => run("pay");
  el.querySelector("#withholdBtn").onclick = () => run("withhold");
  el.querySelector("#applyPriceBtn")?.addEventListener("click", () => {
    const market = marketOf();
    if (!market || !state.lastDividend || state.lastDividend.applied) return;
    const company = state.companies[state.lastDividend.companyIdx];
    const steps = moveSteps(company, state.lastDividend.revenue, state.lastDividend.mode);
    const from = company.price;
    company.price = stepPrice(market, from, steps);
    state.lastDividend.applied = { from, to: company.price };
    save(); render();
  });
}

function renderAddCompanyCard() {
  const gameChips = [`<button class="chip ${!state.game ? "on" : ""}" data-game="">${t("customEntry")}</button>`]
    .concat(Object.keys(GAME_PRESETS).map(g =>
      `<button class="chip ${state.game === g ? "on" : ""}" data-game="${g}">${g}</button>`))
    .join("");

  const preset = GAME_PRESETS[state.game];
  let picker;
  if (preset) {
    const taken = new Set(state.companies.map(c => c.name));
    const remaining = preset.companies.filter(c => !taken.has(c.sym));
    const chipFor = c =>
      `<button class="chip ${pendingPick === c.sym ? "on" : ""}" data-pick="${esc(c.sym)}" title="${esc(c.name || c.sym)}">${esc(c.sym)}</button>`;

    // 그룹이 정의된 게임(18Korea 북한/남한)은 그룹별로 나눠서 표시
    const groupNames = [...new Set(preset.companies.map(c => c.group).filter(Boolean))];
    let chipsArea;
    if (groupNames.length > 0) {
      chipsArea = groupNames.map(g => {
        const items = remaining.filter(c => c.group === g).map(chipFor).join("");
        return items
          ? `<div class="muted" style="margin:6px 0 4px; font-size:12px; letter-spacing:.08em">${esc(tGroup(g))}</div>
             <div class="row wrap">${items}</div>`
          : "";
      }).join("");
    } else {
      chipsArea = `<div class="row wrap">${remaining.map(chipFor).join("")}</div>`;
    }
    if (remaining.length === 0)
      chipsArea = `<span class="muted">${t("allAdded")}</span>`;

    const picked = pendingPick ? preset.companies.find(c => c.sym === pendingPick) : null;
    const fullName = picked?.name && picked.name !== picked.sym ? " · " + esc(picked.name) : "";
    const sizeBtns = preset.sizes
      .map((s, i) => `<button class="btn small ${i === preset.sizes.length - 1 ? "primary" : ""}" data-new-size="${s}" ${pendingPick ? "" : "disabled"}>${t("addNShares", s)}</button>`)
      .join("");

    // 시작 주가(액면가) 선택 — par가 정의된 게임에서 회사를 고르면 표시
    let parRow = "";
    if (preset.par && pendingPick) {
      const cur = pendingPar ?? preset.par.default;
      const parChips = preset.market
        .filter(v => v >= preset.par.min && v <= preset.par.max)
        .map(v => `<button class="chip ${v === cur ? "on" : ""}" data-par="${v}">${v}</button>`)
        .join("");
      parRow = `
        <div class="muted" style="margin:8px 0 4px; font-size:12px">${t("parLabel")}${preset.parNote ? " · " + esc(preset.parNote[lang] || preset.parNote.ko) : ""}</div>
        <div class="row wrap" style="margin-bottom:8px">${parChips}</div>`;
    }

    picker = `
      <div style="margin-bottom:8px">${chipsArea}</div>
      ${parRow}
      <div class="row">
        <span class="grow muted">${pendingPick ? `<b>${esc(pendingPick)}</b>${fullName}` : t("selectPrompt")}</span>
        ${sizeBtns}
      </div>`;
  } else {
    picker = `
      <div class="row">
        <input type="text" id="newCoName" class="grow" placeholder="${t("coNamePlaceholder")}">
        <button class="btn small" data-new-size="2">${t("nShares", 2)}</button>
        <button class="btn small" data-new-size="5">${t("nShares", 5)}</button>
        <button class="btn small primary" data-new-size="10">${t("nShares", 10)}</button>
      </div>`;
  }

  return `<div class="card">
    <h2>${t("addCompany")}</h2>
    <div class="row wrap" style="margin-bottom:8px">${gameChips}</div>
    ${picker}
    <div class="muted" style="margin-top:6px">${t("addCardHint")}</div>
  </div>`;
}

/* --- 회사·보유 탭 --- */
function renderCompany() {
  const el = document.getElementById("view-company");

  const playerChips = state.players.map((p, i) =>
    `<button class="chip" data-del-player="${i}" title="${t("tapToRemove")}">${esc(p)} ✕</button>`
  ).join("");

  const companyCards = state.companies.map((c, i) => {
    const holdRows = state.players.map((p, pi) => {
      const h = c.hold[pi];
      return `<div class="row" style="margin-top:6px">
        <span class="grow">${esc(p)}</span>
        <div class="stepper">
          <button data-step="${i}:${pi}:-1">−</button>
          <span class="val ${h < 0 ? "neg" : ""}">${h}</span>
          <button data-step="${i}:${pi}:1">＋</button>
        </div>
      </div>`;
    }).join("");
    const positiveHeld = c.hold.reduce((a, b) => a + Math.max(0, b), 0);
    const unassigned = c.size - positiveHeld - c.treasury - c.pool;
    return `<div class="card">
      <div class="row">
        <input type="text" value="${esc(c.name)}" data-co-name="${i}" class="grow" style="font-weight:700">
        <button class="btn small" data-del-co="${i}">${t("del")}</button>
      </div>
      <div class="row" style="margin-top:8px">
        ${marketOf() ? `
        <div class="row grow">
          <span class="muted">${t("price")}</span>
          <div class="stepper">
            <button data-price-step="${i}:-1">−</button>
            <span class="val">${c.price}</span>
            <button data-price-step="${i}:1">＋</button>
          </div>
        </div>` : `
        <label class="muted grow">${t("price")} <input type="number" inputmode="numeric" value="${c.price}" data-co-price="${i}"></label>`}
        <label class="muted grow">${t("shareCount")} <input type="number" inputmode="numeric" value="${c.size}" data-co-size="${i}"></label>
      </div>
      ${holdRows}
      <div class="row" style="margin-top:10px; border-top:1px solid var(--line); padding-top:8px">
        <span class="grow muted">${t("treasuryLabel")}</span>
        <div class="stepper">
          <button data-co-field="${i}:treasury:-1">−</button>
          <span class="val">${c.treasury}</span>
          <button data-co-field="${i}:treasury:1">＋</button>
        </div>
      </div>
      <div class="row" style="margin-top:6px">
        <span class="grow muted">${t("poolLabel")}</span>
        <div class="stepper">
          <button data-co-field="${i}:pool:-1">−</button>
          <span class="val">${c.pool}</span>
          <button data-co-field="${i}:pool:1">＋</button>
        </div>
      </div>
      <div class="muted" style="margin-top:8px">${t("unassigned", unassigned)}${unassigned < 0 ? t("shortOk") : ""}</div>
    </div>`;
  }).join("");

  el.innerHTML = `
    <div class="card">
      <h2>${t("players")}</h2>
      <div class="row wrap" style="margin-bottom:8px">${playerChips || `<span class="muted">${t("noneYet")}</span>`}</div>
      <div class="row">
        <input type="text" id="newPlayer" class="grow" placeholder="${t("namePlaceholder")}">
        <button class="btn" id="addPlayer">${t("add")}</button>
      </div>
    </div>
    ${companyCards}
    ${renderAddCompanyCard()}`;

  el.querySelector("#addPlayer").onclick = () => {
    const input = el.querySelector("#newPlayer");
    const name = input.value.trim();
    if (!name) return;
    state.players.push(name);
    state.cash.push(0);
    state.companies.forEach(c => c.hold.push(0));
    input.value = "";
    save(); render();
  };
  el.querySelectorAll("[data-del-player]").forEach(b => b.onclick = () => {
    const i = +b.dataset.delPlayer;
    showConfirm(t("delPlayerConfirm", state.players[i]), t("del"), () => {
      state.players.splice(i, 1);
      state.cash.splice(i, 1);
      state.companies.forEach(c => c.hold.splice(i, 1));
      save(); render();
    });
  });
  el.querySelectorAll("[data-game]").forEach(b => b.onclick = () => {
    state.game = b.dataset.game;
    pendingPick = null;
    pendingPar = null;
    track("game_selected", { game: state.game || "custom" });
    save(); render();
  });
  el.querySelectorAll("[data-pick]").forEach(b => b.onclick = () => {
    pendingPick = b.dataset.pick;
    render();
  });
  el.querySelectorAll("[data-par]").forEach(b => b.onclick = () => {
    pendingPar = +b.dataset.par;
    render();
  });
  el.querySelectorAll("[data-new-size]").forEach(b => b.onclick = () => {
    const preset = GAME_PRESETS[state.game];
    let name;
    if (preset) {
      if (!pendingPick) return;
      name = pendingPick;
      pendingPick = null;
    } else {
      name = el.querySelector("#newCoName").value.trim() || t("defaultCoName", state.companies.length + 1);
    }
    state.companies.push({
      name, size: +b.dataset.newSize,
      price: preset?.par ? (pendingPar ?? preset.par.default) : 100,
      hold: state.players.map(() => 0),
      treasury: 0, pool: 0,
    });
    save(); render();
  });
  el.querySelectorAll("[data-del-co]").forEach(b => b.onclick = () => {
    const i = +b.dataset.delCo;
    showConfirm(t("delCoConfirm", state.companies[i].name), t("del"), () => {
      state.companies.splice(i, 1);
      state.lastDividend = null;
      save(); render();
    });
  });
  el.querySelectorAll("[data-step]").forEach(b => b.onclick = () => {
    const [ci, pi, d] = b.dataset.step.split(":").map(Number);
    const c = state.companies[ci];
    c.hold[pi] = Math.max(-c.size, Math.min(c.size, c.hold[pi] + d));
    save(); render();
  });
  el.querySelectorAll("[data-co-field]").forEach(b => b.onclick = () => {
    const [ci, field, d] = b.dataset.coField.split(":");
    const c = state.companies[ci];
    c[field] = Math.max(0, Math.min(c.size, c[field] + Number(d)));
    save(); render();
  });
  el.querySelectorAll("[data-co-name]").forEach(inp => inp.onchange = () => {
    state.companies[+inp.dataset.coName].name = inp.value.trim() || t("unnamed");
    save();
  });
  el.querySelectorAll("[data-co-price]").forEach(inp => inp.onchange = () => {
    state.companies[+inp.dataset.coPrice].price = Math.max(0, parseInt(inp.value, 10) || 0);
    save();
  });
  el.querySelectorAll("[data-price-step]").forEach(b => b.onclick = () => {
    const market = marketOf();
    if (!market) return;
    const [ci, d] = b.dataset.priceStep.split(":").map(Number);
    const c = state.companies[ci];
    c.price = stepPrice(market, c.price, d);
    save(); render();
  });
  el.querySelectorAll("[data-co-size]").forEach(inp => inp.onchange = () => {
    state.companies[+inp.dataset.coSize].size = Math.max(1, parseInt(inp.value, 10) || 1);
    save(); render();
  });
}

/* --- 최종 점수 탭 --- */
function renderScore() {
  const el = document.getElementById("view-score");
  if (state.players.length === 0) {
    el.innerHTML = `<div class="card"><div class="empty">${t("scoreEmpty")}</div></div>`;
    return;
  }

  const totals = state.players.map((p, i) => {
    const stock = state.companies.reduce((sum, c) => sum + c.hold[i] * c.price, 0);
    return { i, name: p, cash: state.cash[i] || 0, stock, total: (state.cash[i] || 0) + stock };
  });
  const ranking = [...totals].sort((a, b) => b.total - a.total);

  const cards = totals.map(t2 => {
    const breakdown = state.companies
      .filter(c => c.hold[t2.i] !== 0)
      .map(c => {
        const v = c.hold[t2.i] * c.price;
        return `<tr><td>${esc(c.name)}</td><td class="muted">${t("sharesTimes", c.hold[t2.i], fmt(c.price))}</td>
          <td class="money ${v < 0 ? "neg" : ""}">${v < 0 ? "−" + fmt(-v) : fmt(v)}</td></tr>`;
      }).join("");
    const rank = ranking.findIndex(r => r.i === t2.i) + 1;
    return `<div class="card">
      <div class="row">
        <span class="rank-badge ${rank === 1 ? "first" : ""}">${rank}</span>
        <b class="grow">${esc(t2.name)}</b>
        <span class="money" style="font-size:19px" id="total-${t2.i}">${fmt(t2.total)}</span>
      </div>
      <div class="row" style="margin-top:8px">
        <label class="muted grow">${t("cash")}
          <input type="number" inputmode="numeric" value="${t2.cash || ""}" placeholder="0" data-cash="${t2.i}">
        </label>
        <span class="muted">${t("stock")} <b class="money">${fmt(t2.stock)}</b></span>
      </div>
      ${breakdown ? `<table style="margin-top:8px">${breakdown}</table>` : ""}
    </div>`;
  }).join("");

  el.innerHTML = `
    <div class="card">
      <h2>${t("scoreFormula")}</h2>
      <div class="muted">${t("scoreDesc")}</div>
    </div>
    ${cards}`;

  el.querySelectorAll("[data-cash]").forEach(inp => {
    inp.oninput = () => {
      const i = +inp.dataset.cash;
      state.cash[i] = parseInt(inp.value, 10) || 0;
      save();
      const stock = state.companies.reduce((sum, c) => sum + c.hold[i] * c.price, 0);
      document.getElementById("total-" + i).textContent = fmt(state.cash[i] + stock);
    };
  });
}

/* ---------- 공유 모달 ---------- */
function showSessionModal() {
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  let inner;

  if (!FIREBASE_CONFIG) {
    inner = `
      <p><b>${t("setupTitle")}</b></p>
      <p class="muted">${t("setupBody")}</p>
      <button class="btn grow" data-cancel style="width:100%">${t("close")}</button>`;
  } else if (session.code) {
    let lockArea;
    if (isHost()) {
      lockArea = `
        <button class="btn" data-lock style="width:100%; margin-bottom:8px">
          ${session.locked ? "🔓 " + t("unlock") : "🔒 " + t("lock")}
        </button>
        <p class="muted" style="margin-bottom:10px">${t("lockDesc")}</p>`;
    } else {
      lockArea = `<p class="muted" style="margin-bottom:10px">${session.locked ? "🔒 " + t("lockedByHost") : t("sessionDesc")}</p>`;
    }
    inner = `
      <p class="muted" style="text-align:center; margin-bottom:4px">${t("sessionCode")}${isHost() ? " · " + t("youAreHost") : ""}</p>
      <div class="session-code">${session.code}</div>
      ${lockArea}
      <div class="row">
        <button class="btn grow" data-cancel>${t("close")}</button>
        <button class="btn danger grow" data-leave>${t("leaveSession")}</button>
      </div>`;
  } else {
    inner = `
      <p><b>${t("sessionTitle")}</b></p>
      <button class="btn primary" data-create style="width:100%">${t("createSession")}</button>
      <p class="muted" style="text-align:center; margin:10px 0 6px">${t("orJoin")}</p>
      <div class="row">
        <input type="text" data-code class="grow" placeholder="TRN482" maxlength="6"
               autocapitalize="characters" style="text-transform:uppercase; text-align:center; letter-spacing:.2em">
        <button class="btn" data-join>${t("join")}</button>
      </div>
      <p class="muted neg" data-err style="margin:8px 0 0; min-height:1em"></p>
      <button class="btn grow" data-cancel style="width:100%; margin-top:6px">${t("close")}</button>`;
  }

  backdrop.innerHTML = `<div class="modal" role="dialog" aria-modal="true">${inner}</div>`;
  const close = () => backdrop.remove();
  backdrop.onclick = (e) => { if (e.target === backdrop) close(); };
  backdrop.querySelector("[data-cancel]").onclick = close;

  const errEl = backdrop.querySelector("[data-err]");
  const fail = (msg, btn, label) => { if (errEl) errEl.textContent = msg; if (btn) { btn.disabled = false; btn.textContent = label; } };

  backdrop.querySelector("[data-leave]")?.addEventListener("click", () => {
    leaveSession();
    close();
  });
  backdrop.querySelector("[data-lock]")?.addEventListener("click", async (e) => {
    const btn = e.currentTarget;
    btn.disabled = true;
    try {
      await setLocked(!session.locked);
      close(); showSessionModal(); // 바뀐 잠금 상태로 다시 표시
    } catch (err) {
      btn.disabled = false;
    }
  });
  backdrop.querySelector("[data-create]")?.addEventListener("click", async (e) => {
    const btn = e.currentTarget;
    btn.disabled = true; btn.textContent = t("creating");
    try {
      await createSession();
      close(); showSessionModal(); // 코드가 보이는 화면으로 전환
    } catch (err) {
      fail(t("connFail"), btn, t("createSession"));
    }
  });
  backdrop.querySelector("[data-join]")?.addEventListener("click", async (e) => {
    const btn = e.currentTarget;
    const code = backdrop.querySelector("[data-code]").value.trim().toUpperCase();
    if (code.length < 4) { fail(t("checkCode")); return; }
    btn.disabled = true; btn.textContent = "...";
    try {
      await joinSession(code);
      close(); render();
    } catch (err) {
      fail(err.message === "not-found" ? t("notFound") : t("connFail"), btn, t("join"));
    }
  });

  document.body.appendChild(backdrop);
}

/* ---------- 탭 / 초기화 / 언어 ---------- */
document.querySelectorAll("nav button").forEach(b => b.onclick = () => {
  activeTab = b.dataset.tab;
  render();
});
document.getElementById("resetBtn").onclick = () => {
  if (session.code && !isHost()) { showAlert(t("hostOnlyReset")); return; }
  showConfirm(
    session.code ? t("resetConfirmSession") : t("resetConfirm"),
    t("resetOk"), () => {
      // 게임(프리셋) 선택은 유지한 채 데이터만 비운다
      state = { players: [], cash: [], companies: [], selectedCompany: 0, lastDividend: null, game: state.game };
      save(); render();
    });
};
document.getElementById("shareBtn").onclick = showSessionModal;
document.getElementById("langBtn").onclick = () => {
  lang = lang === "ko" ? "en" : "ko";
  try { localStorage.setItem(LANG_KEY, lang); } catch (e) {}
  renderChrome(); render();
};

load();
renderChrome();
render();

// 이전에 참여했던 세션이 있으면 자동 재접속 (새로고침 대응)
(async () => {
  if (!FIREBASE_CONFIG) return;
  let code = null;
  try { code = localStorage.getItem(SESSION_KEY); } catch (e) {}
  if (!code) return;
  try { await joinSession(code); } catch (e) { leaveSession(); }
})();
</script>
